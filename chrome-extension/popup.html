<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .preview {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .preview-thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 8px;
      display: none;
    }
    .preview-thumb.visible { display: block; }
    .preview-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .preview-url {
      font-size: 11px;
      color: #6b6b80;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .save-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #7c5cfc;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #9178ff; }
    .save-btn:disabled { background: #333; cursor: default; }
    .save-btn.saved { background: #22c55e; }
    .status {
      text-align: center;
      font-size: 11px;
      color: #6b6b80;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">AllMarks</span>
  </div>
  <div class="preview">
    <img class="preview-thumb" id="thumb" alt="">
    <div class="preview-title" id="title">読み込み中...</div>
    <div class="preview-url" id="url"></div>
  </div>
  <button class="save-btn" id="saveBtn" disabled>AllMarksに保存</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
